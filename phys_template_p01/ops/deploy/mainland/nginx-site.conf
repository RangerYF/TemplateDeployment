server {
  listen 80;
  listen [::]:80;
  server_name example.com www.example.com;

  root /var/www/phys-template/current;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /index.html {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
    add_header Cache-Control "no-cache";
  }
}
