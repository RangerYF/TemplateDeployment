name: build-static-artifact

on:
  workflow_dispatch:
    inputs:
      app_scope:
        description: Build target used by pnpm build:vercel
        required: false
        default: electric-feedback
        type: choice
        options:
          - electric-feedback
          - builder-feedback
          - builder-free-feedback
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Resolve build scope
        shell: bash
        env:
          INPUT_SCOPE: ${{ github.event.inputs.app_scope }}
        run: |
          echo "VITE_APP_SCOPE=${INPUT_SCOPE:-electric-feedback}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static bundle
        run: pnpm build:vercel

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.VITE_APP_SCOPE }}-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7
